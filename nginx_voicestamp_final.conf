server {
    listen 80;
    listen 443 ssl;
    server_name voicestampremoval.weiwei.website;

    root /var/www/voicestampremoval.weiwei.website;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/voicestampremoval.weiwei.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voicestampremoval.weiwei.website/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }
}